name: Check for broken links

on:
  pull_request:
    branches: ["develop"]
    types: [synchronize, opened]
    paths:
      - "docs/**"
      - ".github/workflows/link-check.yml"
  workflow_dispatch:

jobs:
  wait_for_netlify:
    if: github.base_ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Netlify deploy preview to complete
        run: echo "Netlify deploy preview has passed"
        if: ${{ contains(github.event.pull_request.head.repo.status.contexts, 'netlify') }}

  check_links:
    if: github.base_ref == 'develop'
    runs-on: ubuntu-latest
    needs: wait_for_netlify
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install broken-link-checker

      - name: Wait for Netlify deploy and run broken-link-checker for Label Studio Docs
        run: |
          URL="https://deploy-preview-${{ github.event.pull_request.number }}--label-studio-docs-new-theme.netlify.app"
          MAX_ATTEMPTS=60
          ATTEMPT=0

          echo "Waiting for Netlify deploy to be ready: $URL"
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -f -s -o /dev/null "$URL"; then
              echo "Netlify deploy is ready!"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Deploy not ready yet, waiting 10 seconds..."
            sleep 10
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "Warning: Netlify deploy may not be ready, but proceeding with link check..."
          fi

          npx blc "$URL" -roef --exclude "/api" --filter-level 0
          exit_code=$?  # Capture the exit code
          echo "Exit code: $exit_code"  # Print the exit code

          if [ $exit_code -ne 0 ]; then
            echo "Broken links found!"
            exit 1
          fi

      - name: Wait for Netlify deploy and run broken-link-checker for Human Signal Docs
        run: |
          URL="https://deploy-preview-${{ github.event.pull_request.number }}--heartex-docs.netlify.app"
          MAX_ATTEMPTS=60
          ATTEMPT=0

          echo "Waiting for Netlify deploy to be ready: $URL"
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -f -s -o /dev/null "$URL"; then
              echo "Netlify deploy is ready!"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Deploy not ready yet, waiting 10 seconds..."
            sleep 10
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "Warning: Netlify deploy may not be ready, but proceeding with link check..."
          fi

          npx blc "$URL" -roef --exclude "/api" --filter-level 0
          exit_code=$?  # Capture the exit code
          echo "Exit code: $exit_code"  # Print the exit code

          if [ $exit_code -ne 0 ]; then
            echo "Broken links found!"
            exit 1
          fi
